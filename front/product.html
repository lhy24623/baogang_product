<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品基本信息档案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 20px; color: #333; }
        .header a { color: #667eea; text-decoration: none; font-size: 14px; }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }

        .filter-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .filter-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .filter-title::before { content: ''; width: 3px; height: 16px; background: #667eea; border-radius: 2px; }

        .filter-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
        .filter-item { display: flex; flex-direction: column; gap: 4px; min-width: 200px; flex: 1; }
        .filter-item label { font-size: 12px; color: #888; }
        .filter-item select { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; background: #fff; cursor: pointer; width: 100%; }
        .filter-item select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.15); }
        .filter-item .filter-count { font-size: 11px; color: #bbb; }

        .filter-actions { display: flex; gap: 8px; align-items: flex-end; padding-top: 4px; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-outline { background: #fff; color: #666; border: 1px solid #d9d9d9; }
        .btn-outline:hover { color: #667eea; border-color: #667eea; }

        .data-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .data-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .data-header .title { font-size: 15px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; }
        .data-header .title::before { content: ''; width: 3px; height: 16px; background: #667eea; border-radius: 2px; }
        .data-header .info { font-size: 13px; color: #888; }

        .table-wrap { overflow-x: auto; max-height: 600px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #fafafa; padding: 10px 14px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #e8e8e8; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
        td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; color: #555; white-space: nowrap; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
        tr:hover td { background: #f5f7ff; }

        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
        .pagination .page-info { font-size: 13px; color: #888; }
        .pagination .page-btns { display: flex; gap: 6px; }
        .page-btn { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; color: #555; }
        .page-btn:hover { color: #667eea; border-color: #667eea; }
        .page-btn.active { background: #667eea; color: #fff; border-color: #667eea; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .loading { text-align: center; padding: 60px; color: #999; }
        .spinner { width: 36px; height: 36px; border: 3px solid #e8e8e8; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px; color: #bbb; font-size: 14px; }
        .error-msg { text-align: center; padding: 40px; color: #dc2626; font-size: 14px; background: #fef2f2; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>产品基本信息档案</h1>
        <div style="display:flex;gap:12px;align-items:center;">
            <a href="/" style="color:#667eea;text-decoration:none;font-size:14px;">主页</a>
            <a href="/custom-product" style="background:#667eea;color:#fff;padding:8px 20px;border-radius:6px;text-decoration:none;font-size:14px;">+ 自定义产品</a>
            <a href="/production-sales" style="background:#52c41a;color:#fff;padding:8px 20px;border-radius:6px;text-decoration:none;font-size:14px;">产销统计</a>
        </div>
    </div>

    <div class="container">
        <div class="filter-card">
            <div class="filter-title">筛选条件</div>
            <div class="filter-row">
                <div class="filter-item">
                    <label>产品大类编码</label>
                    <select id="f_prodclass"><option value="">全部</option></select>
                    <span class="filter-count" id="c_prodclass"></span>
                </div>
                <div class="filter-item">
                    <label>产品大类名称</label>
                    <select id="f_prodclasschin"><option value="">全部</option></select>
                    <span class="filter-count" id="c_prodclasschin"></span>
                </div>
                <div class="filter-item">
                    <label>产品形态编码</label>
                    <select id="f_prodtype"><option value="">全部</option></select>
                    <span class="filter-count" id="c_prodtype"></span>
                </div>
                <div class="filter-item">
                    <label>产品形态名称</label>
                    <select id="f_prodtypechin"><option value="">全部</option></select>
                    <span class="filter-count" id="c_prodtypechin"></span>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary" onclick="search()">查询</button>
                    <button class="btn btn-outline" onclick="resetFilters()">重置</button>
                </div>
            </div>
        </div>

        <div class="data-card">
            <div class="data-header">
                <div class="title">数据列表</div>
                <div class="info" id="dataInfo"></div>
                <button class="btn btn-primary" style="padding:6px 16px;font-size:13px;" onclick="exportExcel()" id="exportBtn" disabled>导出Excel</button>
            </div>
            <div class="table-wrap" id="tableArea">
                <div class="loading"><div class="spinner"></div>加载中...</div>
            </div>
            <div class="pagination">
                <div class="page-info" id="pageInfo"></div>
                <div class="page-btns" id="pageBtns"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 50;
        let totalRecords = 0;

        // 加载筛选选项
        async function loadFilters() {
            try {
                const res = await fetch('/api/product/filters');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                if (!json.success) throw new Error(json.error || '获取选项失败');
                
                const opts = json.options;
                fillSelect('f_prodclass', opts.prodclass, 'c_prodclass');
                fillSelect('f_prodclasschin', opts.prodclasschin, 'c_prodclasschin');
                fillSelect('f_prodtype', opts.prodtype, 'c_prodtype');
                fillSelect('f_prodtypechin', opts.prodtypechin, 'c_prodtypechin');
            } catch (e) {
                console.error('加载筛选选项失败:', e);
                ['f_prodclass','f_prodclasschin','f_prodtype','f_prodtypechin'].forEach(id => {
                    const sel = document.getElementById(id);
                    sel.innerHTML = '<option value="">加载失败</option>';
                });
            }
        }

        function fillSelect(id, values, countId) {
            const sel = document.getElementById(id);
            // 清空并添加"全部"选项
            sel.innerHTML = '<option value="">全部</option>';
            
            if (!values || !Array.isArray(values)) return;
            
            values.forEach(v => {
                if (v === null || v === undefined) return;
                const opt = document.createElement('option');
                opt.value = String(v);
                opt.textContent = String(v);
                sel.appendChild(opt);
            });
            
            // 显示选项数量
            if (countId) {
                document.getElementById(countId).textContent = values.length + ' 个选项';
            }
        }

        // 查询
        async function search(page) {
            if (page === undefined) page = 1;
            currentPage = page;
            
            const body = {
                prodclass: document.getElementById('f_prodclass').value,
                prodclasschin: document.getElementById('f_prodclasschin').value,
                prodtype: document.getElementById('f_prodtype').value,
                prodtypechin: document.getElementById('f_prodtypechin').value,
                page: currentPage,
                pageSize: pageSize
            };

            document.getElementById('tableArea').innerHTML = '<div class="loading"><div class="spinner"></div>查询中...</div>';

            try {
                const res = await fetch('/api/product/list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                
                if (json.success) {
                    totalRecords = json.total;
                    renderTable(json.data);
                    renderPagination();
                } else {
                    document.getElementById('tableArea').innerHTML = '<div class="error-msg">查询失败: ' + esc(String(json.error)) + '</div>';
                    document.getElementById('dataInfo').textContent = '';
                    renderPagination();
                }
            } catch (e) {
                document.getElementById('tableArea').innerHTML = '<div class="error-msg">请求失败: ' + esc(e.message) + '</div>';
                document.getElementById('dataInfo').textContent = '';
            }
        }

        function renderTable(data) {
            currentData = data || [];
            document.getElementById('exportBtn').disabled = !data || data.length === 0;
            if (!data || data.length === 0) {
                document.getElementById('tableArea').innerHTML = '<div class="empty">暂无数据</div>';
                document.getElementById('dataInfo').textContent = totalRecords > 0 ? '共 ' + totalRecords + ' 条（当前页无数据）' : '';
                return;
            }

            const cols = Object.keys(data[0]);
            let html = '<table><thead><tr><th>序号</th>';
            cols.forEach(c => html += '<th>' + esc(c) + '</th>');
            html += '</tr></thead><tbody>';
            
            const offset = (currentPage - 1) * pageSize;
            data.forEach((row, i) => {
                html += '<tr><td>' + (offset + i + 1) + '</td>';
                cols.forEach(c => {
                    const v = row[c];
                    if (v === null || v === undefined) {
                        html += '<td style="color:#bbb">NULL</td>';
                    } else {
                        html += '<td title="' + esc(String(v)) + '">' + esc(String(v)) + '</td>';
                    }
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            
            document.getElementById('tableArea').innerHTML = html;
            document.getElementById('dataInfo').textContent = '共 ' + totalRecords + ' 条';
        }

        function renderPagination() {
            const totalPages = Math.ceil(totalRecords / pageSize) || 1;
            document.getElementById('pageInfo').textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + totalRecords + ' 条';

            let html = '';
            html += '<button class="page-btn"' + (currentPage <= 1 ? ' disabled' : '') + ' onclick="search(' + (currentPage - 1) + ')">上一页</button>';

            // 显示页码按钮（最多7个）
            let start = Math.max(1, currentPage - 3);
            let end = Math.min(totalPages, start + 6);
            start = Math.max(1, end - 6);

            for (let i = start; i <= end; i++) {
                html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" onclick="search(' + i + ')">' + i + '</button>';
            }

            html += '<button class="page-btn"' + (currentPage >= totalPages ? ' disabled' : '') + ' onclick="search(' + (currentPage + 1) + ')">下一页</button>';
            document.getElementById('pageBtns').innerHTML = html;
        }

        function resetFilters() {
            ['f_prodclass', 'f_prodclasschin', 'f_prodtype', 'f_prodtypechin'].forEach(function(id) {
                document.getElementById(id).value = '';
            });
            search(1);
        }

        function esc(t) {
            if (t === null || t === undefined) return '';
            var d = document.createElement('div');
            d.textContent = String(t);
            return d.innerHTML;
        }

        // 导出Excel（全量数据）
        let currentData = [];
        async function exportExcel() {
            if (totalRecords === 0) { alert('暂无数据可导出'); return; }
            var btn = document.getElementById('exportBtn');
            btn.disabled = true; btn.textContent = '导出中...';
            try {
                // 重新请求全量数据
                const body = {
                    prodclass: document.getElementById('f_prodclass').value,
                    prodclasschin: document.getElementById('f_prodclasschin').value,
                    prodtype: document.getElementById('f_prodtype').value,
                    prodtypechin: document.getElementById('f_prodtypechin').value,
                    page: 1,
                    pageSize: 999999
                };
                const res = await fetch('/api/product/list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const json = await res.json();
                if (!json.success || !json.data || json.data.length === 0) { alert('获取全量数据失败'); return; }
                const allData = json.data;
                const cols = Object.keys(allData[0]);
                const rows = allData.map(function(row) {
                    return cols.map(function(c) { return row[c] === null ? '' : row[c]; });
                });
                const exportRes = await fetch('/api/export/excel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileName: '产品档案',
                        sheets: [{ sheetName: '产品档案', columns: cols, data: rows }]
                    })
                });
                if (!exportRes.ok) { alert('导出失败'); return; }
                const blob = await exportRes.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = '产品档案.xlsx';
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); URL.revokeObjectURL(url);
            } catch (e) { alert('导出失败: ' + e.message); }
            finally { btn.disabled = false; btn.textContent = '导出Excel'; }
        }

        // 初始化：先加载筛选选项，再查询数据
        loadFilters().then(function() {
            search(1);
        });
    </script>
</body>
</html>
